<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a200e"/>
      <stop offset="100%" stop-color="#1a1508"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" fill="url(#bg3)" rx="12"/>
  <!-- glow -->
  <circle cx="60" cy="48" r="32" fill="#F0C050" opacity="0.08"/>
  <circle cx="60" cy="48" r="24" fill="#F0C050" opacity="0.12"/>
  <!-- bulb -->
  <circle cx="60" cy="42" r="20" fill="none" stroke="#F0C050" stroke-width="2.5"/>
  <path d="M50 58 Q50 68 52 72 L68 72 Q70 68 70 58" fill="none" stroke="#F0C050" stroke-width="2.5"/>
  <!-- filament -->
  <path d="M55 38 Q58 48 60 38 Q62 48 65 38" fill="none" stroke="#D4A030" stroke-width="2"/>
  <!-- base -->
  <rect x="52" y="72" width="16" height="3" rx="1" fill="#D4A030"/>
  <rect x="53" y="76" width="14" height="3" rx="1" fill="#D4A030"/>
  <rect x="54" y="80" width="12" height="3" rx="1" fill="#D4A030"/>
  <!-- sparkles -->
  <text x="30" y="30" fill="#F0C050" font-size="14" opacity="0.6">*</text>
  <text x="85" y="35" fill="#F0C050" font-size="16" opacity="0.5">*</text>
  <text x="25" y="65" fill="#F0C050" font-size="10" opacity="0.4">*</text>
  <!-- ? mark -->
  <text x="80" y="100" fill="#D4A030" font-size="24" font-weight="bold" opacity="0.3">?</text>
</svg>