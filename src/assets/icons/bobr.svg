<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1f0e"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" fill="url(#bg1)" rx="12"/>
  <!-- body -->
  <ellipse cx="60" cy="72" rx="28" ry="24" fill="#8B6914"/>
  <!-- head -->
  <circle cx="60" cy="48" r="22" fill="#A0791A"/>
  <!-- ears -->
  <circle cx="42" cy="32" r="7" fill="#8B6914"/>
  <circle cx="42" cy="32" r="4" fill="#D4A030"/>
  <circle cx="78" cy="32" r="7" fill="#8B6914"/>
  <circle cx="78" cy="32" r="4" fill="#D4A030"/>
  <!-- eyes -->
  <circle cx="52" cy="45" r="4" fill="#1a1208"/>
  <circle cx="68" cy="45" r="4" fill="#1a1208"/>
  <circle cx="53" cy="44" r="1.5" fill="white"/>
  <circle cx="69" cy="44" r="1.5" fill="white"/>
  <!-- nose -->
  <ellipse cx="60" cy="53" rx="5" ry="3.5" fill="#5a3a08"/>
  <!-- teeth -->
  <rect x="56" y="57" width="4" height="6" rx="1" fill="white"/>
  <rect x="61" y="57" width="4" height="6" rx="1" fill="white"/>
  <!-- tail -->
  <ellipse cx="60" cy="98" rx="14" ry="5" fill="#6a5010" transform="rotate(-5 60 98)"/>
</svg>